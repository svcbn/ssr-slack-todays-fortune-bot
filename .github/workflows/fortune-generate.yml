name: fortune-bot (generate)

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Test: off / single (admin 1명) / all (전체→admin DM)"
        required: false
        type: choice
        options:
          - "off"
          - "single"
          - "all"
        default: "off"
      audit_only:
        description: "Audit/validate only (no generation)"
        required: false
        type: boolean
        default: false
      target_date:
        description: "Target date (YYYY-MM-DD), blank = today"
        required: false
        type: string
        default: ""
  schedule:
    # KST 09:50 (주말 제외) = UTC 00:50 (월~금)
    # generate를 먼저 실행 → 10:05에 send 실행
    - cron: "50 0 * * 1-5"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate fortunes
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_LIST_ID: ${{ secrets.SLACK_LIST_ID }}
          ADMIN_USER_IDS: ${{ secrets.ADMIN_USER_IDS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}
          OUTPUT_DIR: "output"
          AUDIT_ONLY: ${{ github.event.inputs.audit_only || 'false' }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'off' }}
          TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
        run: |
          python generate.py

      - name: Upload fortune JSON
        if: ${{ github.event.inputs.audit_only != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: fortunes
          path: output/fortunes_*.json
          retention-days: 7

  send:
    needs: generate
    if: ${{ github.event.inputs.audit_only != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download fortune JSON
        uses: actions/download-artifact@v4
        with:
          name: fortunes
          path: output

      - name: Send fortunes to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          ADMIN_USER_IDS: ${{ secrets.ADMIN_USER_IDS }}
          OUTPUT_DIR: "output"
          TEST_MODE: ${{ github.event.inputs.test_mode || 'off' }}
          TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
        run: |
          python send.py
